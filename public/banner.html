<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis.NFT - X Banner (1500x500)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #010828; overflow: hidden; }
      canvas { display: block; width: 100%; height: 100vh; }
      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        color: #EFF4FF;
        font-family: monospace;
        font-size: 14px;
        z-index: 100;
        background: rgba(1, 8, 40, 0.8);
        padding: 10px 15px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="info">X Banner Preview (1500x500) — Screenshot this at 100% zoom</div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x010828);
      scene.fog = new THREE.Fog(0x010828, 30, 80);

      const camera = new THREE.PerspectiveCamera(45, 1500 / 500, 0.1, 1000);
      camera.position.set(0, 6, 22);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);
      
      const pointLight1 = new THREE.PointLight(0xb724ff, 2, 30);
      pointLight1.position.set(-8, 5, 5);
      scene.add(pointLight1);
      
      const pointLight2 = new THREE.PointLight(0x6FFF00, 2, 30);
      pointLight2.position.set(8, 5, 5);
      scene.add(pointLight2);

      // Ground plane
      const groundGeo = new THREE.PlaneGeometry(200, 100);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x010828, roughness: 0.9 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -2.2;
      scene.add(ground);

      // Simple astronaut shapes (placeholder for now)
      function createAstronaut(x, z, color) {
        const group = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.CapsuleGeometry(0.75, 1, 8, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe8f0ff, roughness: 0.55 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        group.add(body);

        // Helmet
        const helmetGeo = new THREE.SphereGeometry(1.15, 32, 32);
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0xf0f3ff, roughness: 0.5 });
        const helmet = new THREE.Mesh(helmetGeo, helmetMat);
        helmet.position.y = 1.65;
        group.add(helmet);

        // Visor
        const visorGeo = new THREE.SphereGeometry(0.85, 32, 32, 0, Math.PI, 0, Math.PI / 2);
        const visorMat = new THREE.MeshPhysicalMaterial({
          color: color,
          roughness: 0.05,
          metalness: 0.95,
          clearcoat: 1,
          transparent: true,
          opacity: 0.85
        });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 1.6, 0.25);
        group.add(visor);

        group.position.set(x, 0, z);
        scene.add(group);
        return group;
      }

      // Three astronauts
      const astro1 = createAstronaut(-6, 0, 0xffb3b3); // Rose visor
      const astro2 = createAstronaut(0, -2, 0xffffff); // White fluffy
      const astro3 = createAstronaut(6, 0, 0xffd84a); // Yellow eyes

      // Glowing rings
      const ring1 = new THREE.Mesh(
        new THREE.TorusGeometry(6, 0.05, 16, 100),
        new THREE.MeshBasicMaterial({ color: 0x6FFF00, transparent: true, opacity: 0.4 })
      );
      ring1.position.set(0, 3, -5);
      ring1.rotation.x = 0.5;
      scene.add(ring1);

      const ring2 = new THREE.Mesh(
        new THREE.TorusGeometry(5.2, 0.05, 16, 100),
        new THREE.MeshBasicMaterial({ color: 0xb724ff, transparent: true, opacity: 0.3 })
      );
      ring2.position.set(0, 3, -5);
      ring2.rotation.set(0.5, 0, Math.PI / 6);
      scene.add(ring2);

      // Stars
      const starGeo = new THREE.BufferGeometry();
      const starPositions = [];
      for (let i = 0; i < 2000; i++) {
        starPositions.push((Math.random() - 0.5) * 200);
        starPositions.push((Math.random() - 0.5) * 200);
        starPositions.push((Math.random() - 0.5) * 200);
      }
      starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
      scene.add(new THREE.Points(starGeo, starMat));

      // Animation
      let time = 0;
      function animate() {
        time += 0.01;
        astro1.position.y = Math.sin(time * 1.5) * 0.25;
        astro2.position.y = Math.sin(time * 1.5 + 1.5) * 0.25;
        astro3.position.y = Math.sin(time * 1.5 + 3) * 0.25;
        
        astro1.rotation.y += 0.01;
        astro2.rotation.y += 0.015;
        astro3.rotation.y += 0.01;

        ring1.rotation.z += 0.005;
        ring2.rotation.z -= 0.003;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();

      // Handle resize
      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
